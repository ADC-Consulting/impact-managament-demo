<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ADC Pattern — Background</title>

    <script>
      // Routed through Vite's dev proxy to bypass CORS — see vite.config.js.
      window.ENV = {
        BACKEND_URL: "/api",
        BACKEND_API_URL: "/api",
      };
    </script>

    <script type="module" crossorigin src="/assets/main-Bc2bcQzX.js"></script>
    <link rel="modulepreload" crossorigin href="/assets/textToParams-Bwwq_J7M.js" />
    <link rel="modulepreload" crossorigin href="/assets/SvgMetadata-B62NTUa0.js" />
    <link rel="stylesheet" crossorigin href="/assets/main-C6EhI6x7.css" />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div class="app-container">
      <div class="controls-panel">
        <div id="parameter-manager-container"></div>
      </div>

      <div class="canvas-panel">
        <div class="canvas-wrapper">
          <svg
            id="mainSvg"
            width="1920"
            height="1080"
            viewBox="0 0 1920 1080"
            preserveAspectRatio="xMidYMid meet"
          ></svg>
        </div>
        <div id="candidates-container"></div>
      </div>
    </div>

    <main class="overlay" aria-live="polite">
      <header><span class="brand">ADC Pattern Generator</span></header>

      <h1>
        A new pattern,<br />
        every refresh.
      </h1>

      <footer class="meta">
        <div><span class="label">Prompt</span> <span id="prompt-out">—</span></div>
        <div><span class="label">Status</span> <span id="status-out">booting</span></div>

        <div class="palette-block">
          <span class="label">Colour</span>
          <div id="palette" class="palette" role="group" aria-label="Pick a pattern colour"></div>
        </div>

        <div class="bg-block">
          <span class="label">Background</span>
          <div id="bg-palette" class="palette" role="group" aria-label="Pick a background colour"></div>
        </div>
      </footer>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
